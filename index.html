    <!-- Fixed (non-"device-width") layout width -- tablets/iPads render the
         exact desktop layout at this width and the browser auto-zooms it
         to fit the physical screen, instead of reflowing to a narrower
         mobile-style layout. Keep in sync with the widths the design was
         tuned against if this ever needs to change. -->
    <meta name="viewport" content="width=1280, user-scalable=no" />

  </head>
